<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#063e62" />
    <title>THE IN PARTNERS - News Admin</title>
    <style>
      :root {
        --blue: #08658d;
        --deep: #004d72;
        --line: rgba(8, 101, 141, 0.16);
        --bg: #f6f7f4;
        --panel: #ffffff;
        --muted: #66706b;
        --text: #171a18;
        --danger: #a33a3a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Manrope, Arial, sans-serif;
        line-height: 1.5;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .admin-shell {
        width: min(920px, calc(100% - 40px));
        margin: 0 auto;
        padding: 34px 0 54px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 30px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 800;
        font-size: 20px;
      }

      .mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--deep);
        color: white;
        font-size: 12px;
      }

      .home-link,
      .primary-btn,
      .danger-btn {
        border-radius: 8px;
        cursor: pointer;
        font-weight: 800;
        text-decoration: none;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid var(--line);
        background: white;
        color: var(--blue);
        font-size: 12px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 240px;
        gap: 28px;
        align-items: end;
        padding-bottom: 28px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 16px;
        color: var(--deep);
        font-size: clamp(34px, 5vw, 62px);
        line-height: 1.02;
        font-weight: 500;
        letter-spacing: 0;
      }

      .lead {
        max-width: 660px;
        margin: 0;
        color: var(--muted);
        font-size: 18px;
      }

      .stat,
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 60px rgba(0, 32, 48, 0.1);
      }

      .stat {
        padding: 22px;
      }

      .stat strong {
        display: block;
        color: var(--blue);
        font-size: 44px;
        line-height: 1;
        font-weight: 500;
      }

      .stat span {
        color: var(--muted);
        font-size: 14px;
      }

      .panel {
        padding: 22px;
      }

      .login-form,
      .admin-form {
        display: grid;
        gap: 10px;
      }

      .admin-form {
        grid-template-columns: 1fr 1fr;
      }

      .admin-form .full {
        grid-column: 1 / -1;
      }

      .input {
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: white;
        color: var(--text);
      }

      textarea.input {
        min-height: 92px;
        padding: 12px 14px;
        resize: vertical;
      }

      .primary-btn {
        min-height: 46px;
        border: 0;
        background: var(--blue);
        color: white;
      }

      .admin-list {
        display: grid;
        gap: 10px;
        margin-top: 22px;
      }

      .admin-item {
        display: grid;
        grid-template-columns: 1fr 46px;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
      }

      .admin-news-text {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .admin-news-text span {
        color: var(--muted);
        font-size: 13px;
      }

      .admin-url {
        min-width: 0;
        overflow: hidden;
        color: var(--blue);
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .danger-btn {
        width: 40px;
        height: 40px;
        border: 1px solid #efcaca;
        background: #fff8f8;
        color: var(--danger);
      }

      .message,
      .empty {
        margin-top: 12px;
        color: var(--muted);
      }

      .empty {
        padding: 28px;
        border: 1px dashed #bbc6bf;
        border-radius: 8px;
        text-align: center;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 720px) {
        .admin-shell {
          width: min(100% - 28px, 920px);
          padding-top: 22px;
        }

        .topbar,
        .hero {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .topbar {
          flex-direction: column;
        }

        .admin-form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="admin-shell">
      <nav class="topbar" aria-label="상단 메뉴">
        <div class="brand"><span class="mark" aria-hidden="true">THE IN</span><span>뉴스 관리자</span></div>
        <a class="home-link" href="./index.html#news">사이트 뉴스 보기</a>
      </nav>

      <section class="hero">
        <div>
          <h1>뉴스 링크를 관리합니다.</h1>
          <p class="lead">GitHub 저장소의 뉴스 파일을 수정해 사이트 뉴스 섹션에 반영합니다.</p>
        </div>
        <aside class="stat" aria-label="등록된 뉴스 수">
          <strong id="adminCount">0</strong>
          <span>저장된 링크</span>
        </aside>
      </section>

      <section class="panel" id="loginPanel">
        <form class="login-form" id="loginForm">
          <input class="input" id="githubToken" type="password" autocomplete="current-password" placeholder="GitHub 관리자 토큰" autofocus />
          <button class="primary-btn" type="submit">로그인</button>
        </form>
        <p class="message" id="loginMessage"></p>
      </section>

      <section class="panel hidden" id="managerPanel">
        <form class="admin-form" id="newsForm">
          <input class="input full" id="newsUrl" type="url" placeholder="https://news.example.com/article" required />
          <input class="input" id="newsTitle" type="text" placeholder="기사 제목" />
          <input class="input" id="newsDate" type="text" placeholder="날짜" />
          <input class="input full" id="newsImage" type="url" placeholder="썸네일 이미지 URL" />
          <textarea class="input full" id="newsExcerpt" placeholder="기사 요약"></textarea>
          <button class="primary-btn full" type="submit">추가</button>
        </form>
        <div class="admin-list" id="adminList"></div>
        <p class="message" id="message"></p>
      </section>
    </main>

    <script src="./js/news-admin.js"></script>
  </body>
</html>
