<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#b8b8b8" />
    <meta
      name="description"
      content="전국 주요 부동산 개발 프로젝트를 확인하는 더인파트너스 3D 프로젝트 지도"
    />
    <title>THE IN PARTNERS — 3D Project Map</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="project-map" id="projectMap">
      <div class="project-pills" id="projectPills" aria-label="프로젝트 목록"></div>

      <canvas id="koreaMapCanvas" aria-label="대한민국 3D 프로젝트 지도"></canvas>

      <aside class="project-panel" id="projectPanel" aria-live="polite">
        <img id="panelImage" src="" alt="" />
        <div class="project-panel__body">
          <strong id="panelStatus"></strong>
          <h1 id="panelTitle"></h1>
          <p id="panelAddress"></p>
          <dl>
            <div>
              <dt>연면적</dt>
              <dd id="panelArea"></dd>
            </div>
            <div>
              <dt>세대수</dt>
              <dd id="panelUnits"></dd>
            </div>
            <div>
              <dt>준공</dt>
              <dd id="panelCompletion"></dd>
            </div>
          </dl>
          <small id="panelNote"></small>
        </div>
      </aside>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./js/project-data.js"></script>
    <script src="./js/pin_mesh_factory.js"></script>
    <script src="./js/korea-map.js"></script>
  </body>
</html>
